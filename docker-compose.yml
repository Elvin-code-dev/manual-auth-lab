version: "3.8"

services:
  campus-mysql:
    image: mysql:8
    container_name: campus_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: campuspass
      MYSQL_DATABASE: campus_club_hub
    ports:
      - "3308:3306"
    volumes:
      - campus_mysql_data:/var/lib/mysql

  campus-phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: campus_phpmyadmin
    restart: always
    environment:
      PMA_HOST: campus-mysql
      MYSQL_ROOT_PASSWORD: campuspass
    ports:
      - "8081:80"

volumes:
  campus_mysql_data: